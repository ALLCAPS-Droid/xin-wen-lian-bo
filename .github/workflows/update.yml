name: Update today xin wen lian bo

on:
  workflow_dispatch:
  schedule:
    # 东八区 (UTC+8), 所以要-8 小时
    - cron: '40 12 * * *'

jobs:
  update:
    name: Update today xin wen lian bo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - run: npm install
      - run: npm run index
      - run: git config --local user.email "github-actions[bot]@github.com"
      - run: git config --local user.name "github-actions[bot]"
      - run: git add .
      - run: git commit -m "AUTO UPDATE [bot]"
      - name: Push master changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
# ================= 新增：获取当天文件名并发送邮件 =================
      - name: Prepare email variables
        id: prepare_vars
        run: |
          # 1. 获取用于匹配文件名的日期 (假设原项目格式是 YYYYMMDD)
          FILE_DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d') 
          FILE_PATH="news/${FILE_DATE}.md" 
          echo "FILE_PATH=$FILE_PATH" >> $GITHUB_ENV
          
          # 2. 获取用于邮件标题的友好日期格式 (例如：2026 年 03 月 20 日)
          SUBJECT_DATE=$(TZ='Asia/Shanghai' date +'%Y 年%m 月%d 日' | tr -d ' ')
          echo "SUBJECT_DATE=$SUBJECT_DATE" >> $GITHUB_ENV
     
      # ================= 修改：将 Markdown 转换为 HTML 并注入样式 =================
      - name: Convert Markdown to HTML with CSS
        run: |
          npm install -g marked
          # 1. 先将 markdown 转换为纯 HTML，存入临时文件 temp.html
          marked ${{ env.FILE_PATH }} > temp.html
          
          # 2. 创建一段强制加粗标题、优化排版的 CSS 样式，写入 email_body.html
          echo '<style>
            body { 
              font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Microsoft YaHei", sans-serif; 
              line-height: 1.6; 
              color: #333; 
              padding: 10px; 
            }
            /* 强制所有层级的标题加粗，并设置颜色和间距 */
            h1, h2, h3, h4, h5, h6 { 
              font-weight: bold !important; 
              color: #000 !important; 
              margin-top: 1.5em; 
              margin-bottom: 0.5em; 
            }
            /* 强制加粗语法生效 */
            strong, b { 
              font-weight: bold !important; 
              color: #000 !important; 
            }
            /* 段落间距 */
            p { 
              margin-bottom: 1em; 
            }
          </style>' > email_body.html
          
          # 3. 将转换好的正文 HTML 拼接到样式表后面
          cat temp.html >> email_body.html
      # =========================================================================
      
      - name: Send email with news
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          # 在主题中引用刚才生成的日期变量
          subject: 新闻联播文字稿 - ${{ env.SUBJECT_DATE }}
          to: ${{ secrets.MAIL_TO }}
          from: 新闻联播小助手
          html_body: file://email_body.html    
          ignore_cert: true
