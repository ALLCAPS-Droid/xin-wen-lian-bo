name: Update today xin wen lian bo

on:
  workflow_dispatch:

jobs:
  update:
    name: Update today xin wen lian bo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install
      - run: npm run index

      # ================= 新增：生成 RSS 订阅源 (可选) =================
      # ⚠️ 注意：前提是你已经在仓库根目录创建了 build_rss.js 文件
      # 如果你不需要 RSS 功能，可以把这个 step 整段删掉
      - name: Generate RSS Feed
        run: |
          npm install feed marked
          node build_rss.js || echo "RSS 生成失败或未配置，跳过"
      # ===============================================================

      # ================= 邮件处理 1：获取当天文件名和日期 =================
      - name: Prepare email variables
        id: prepare_vars
        run: |
          # 1. 获取用于匹配文件名的日期 (假设原项目格式是 YYYYMMDD)
          FILE_DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d') 
          # 注意：你的路径写的是 news/ 文件夹，请确保原项目确实是存在这里
          FILE_PATH="news/${FILE_DATE}.md" 
          echo "FILE_PATH=$FILE_PATH" >> $GITHUB_ENV
          
          # 2. 获取用于邮件标题的友好日期格式，并强制去除一切空格
          SUBJECT_DATE=$(TZ='Asia/Shanghai' date +'%Y 年%m 月%d 日' | tr -d ' ')
          echo "SUBJECT_DATE=$SUBJECT_DATE" >> $GITHUB_ENV
     
      # ================= 邮件处理 2：Markdown 转 HTML 并注入排版样式 =================
      - name: Convert Markdown to HTML with Styles
        run: |
          # 1. 安装转换工具并生成基础 HTML
          npm install -g marked
          marked ${{ env.FILE_PATH }} > raw_body.html
          
          # 2. 创建一段自定义 CSS 样式表，强制覆盖邮箱默认样式
          cat << 'EOF' > style_block.html
          <style>
            body { font-family: "Microsoft YaHei", sans-serif; line-height: 1.8; color: #333333; font-size: 16px; }
            h1, h2, h3, h4 { color: #1a1a1a; font-weight: bold !important; margin-top: 20px; margin-bottom: 10px; }
            h1 { font-size: 24px !important; border-bottom: 1px solid #eeeeee; padding-bottom: 5px; }
            h2 { font-size: 20px !important; }
            h3 { font-size: 18px !important; }
            strong, b { font-weight: bold !important; font-size: inherit !important; }
            p { margin-bottom: 15px; }
          </style>
          EOF
          
          # 3. 把样式表和正文内容合并，生成最终要发送的 html
          cat style_block.html raw_body.html > email_body.html
      
      # ================= 邮件处理 3：发送精美邮件 =================
      - name: Send email with news
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 新闻联播文字稿 - ${{ env.SUBJECT_DATE }}
          from: 新闻联播小助手
          bcc: ${{ secrets.MAIL_TO }}
          html_body: file://email_body.html
          ignore_cert: true

      # ================= 最后一步：保存并推送所有变更到 GitHub =================
      # ⚠️ 必须把 git commit 和 push 放在所有文件（包括邮件HTML和RSS）都生成完毕之后！
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 加上 || true，防止如果今天没抓取到新内容，commit 会报错导致整个 Action 失败
          git commit -m "AUTO UPDATE [bot]" || true
          
      - name: Push master changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
